<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAJHA Regression Suite v2 — Full UI + API</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e0e0e0;font-size:13px}
  h1{padding:18px 24px;font-size:18px;color:#fff;background:#1a1d2e;border-bottom:1px solid #2d3150}
  .meta{padding:10px 24px;background:#13162a;color:#8899aa;font-size:12px;border-bottom:1px solid #2d3150}
  .controls{padding:12px 24px;display:flex;gap:10px;align-items:center;background:#1a1d2e;border-bottom:1px solid #2d3150;flex-wrap:wrap}
  button.run-btn{background:#3b5bdb;color:#fff;border:none;padding:8px 22px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
  button.run-btn:disabled{opacity:.45;cursor:default}
  .scoreboard{display:flex;gap:0;border:1px solid #2d3150;border-radius:8px;overflow:hidden}
  .score-cell{padding:6px 18px;text-align:center;font-weight:700;font-size:15px;min-width:80px}
  .sc-total{background:#1e2235;color:#aab4cf}
  .sc-pass{background:#0d2e1a;color:#4ade80}
  .sc-fail{background:#2e0d0d;color:#f87171}
  .sc-skip{background:#2a2218;color:#fbbf24}
  .sc-label{font-size:10px;font-weight:400;display:block;opacity:.7}
  .elapsed{color:#8899aa;font-size:12px}
  #progress-bar{width:100%;height:4px;background:#1e2235;border-radius:2px;overflow:hidden}
  #progress-fill{height:100%;background:#3b5bdb;width:0%;transition:width .2s}
  #main{display:flex;gap:0;height:calc(100vh - 130px)}
  #group-nav{width:220px;flex-shrink:0;overflow-y:auto;background:#13162a;border-right:1px solid #2d3150;padding:8px 0}
  .nav-group{padding:7px 14px;cursor:pointer;border-left:3px solid transparent;font-size:12px;color:#8899aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-group:hover{color:#e0e0e0;background:rgba(255,255,255,.04)}
  .nav-group.active{color:#fff;border-left-color:#3b5bdb;background:rgba(59,91,219,.12)}
  .nav-group .g-badge{float:right;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:#1e2235;color:#8899aa}
  .nav-group .g-badge.fail{background:#2e0d0d;color:#f87171}
  .nav-group .g-badge.pass{background:#0d2e1a;color:#4ade80}
  #results{flex:1;overflow-y:auto;padding:16px 24px}
  .group-block{margin-bottom:28px}
  .group-title{font-size:14px;font-weight:700;color:#aab4cf;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2d3150;display:flex;justify-content:space-between;align-items:center}
  .group-role{font-size:11px;font-weight:400;color:#556080;background:#1e2235;padding:2px 8px;border-radius:10px}
  .test-row{display:grid;grid-template-columns:72px 1fr 80px 1fr;gap:0;border-bottom:1px solid #1e2235;padding:6px 0;align-items:start}
  .test-row:hover{background:rgba(255,255,255,.02)}
  .test-id{font-weight:700;color:#556080;font-size:12px;font-family:monospace}
  .test-name{color:#c8d0e8;padding-right:12px;font-size:12px}
  .test-name.isolation{color:#a78bfa}
  .test-status{text-align:center;font-weight:700;font-size:11px;padding:2px 6px;border-radius:4px}
  .status-pass{background:#0d2e1a;color:#4ade80}
  .status-fail{background:#2e0d0d;color:#f87171}
  .status-skip{background:#2a2218;color:#fbbf24}
  .status-run{background:#1e3060;color:#93c5fd;animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .test-detail{color:#556080;font-size:11px;padding-left:8px;word-break:break-word}
  .test-detail.err{color:#f87171}
</style>
</head>
<body>
<h1>SAJHA Intelligence Platform — Regression Suite v2</h1>
<div class="meta" id="suite-meta">Full UI + API · All roles (super_admin, admin, user) · localhost:8000</div>
<div class="controls">
  <button class="run-btn" id="runBtn" onclick="runAll()">▶ Run All Tests</button>
  <div class="scoreboard">
    <div class="score-cell sc-total"><span id="s-total">0</span><span class="sc-label">total</span></div>
    <div class="score-cell sc-pass"><span id="s-pass">0</span><span class="sc-label">pass</span></div>
    <div class="score-cell sc-fail"><span id="s-fail">0</span><span class="sc-label">fail</span></div>
    <div class="score-cell sc-skip"><span id="s-skip">0</span><span class="sc-label">skip</span></div>
  </div>
  <span class="elapsed" id="elapsed"></span>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="main">
  <div id="group-nav"></div>
  <div id="results"></div>
</div>

<script>
'use strict';
// ─── Auth guard — super_admin only ───────────────────────────────────────────
(function() {
  var token = sessionStorage.getItem('rg_token');
  var user = null;
  try { user = JSON.parse(sessionStorage.getItem('rg_user')); } catch(e) {}
  if (!token || !user) { window.location.replace('login.html'); return; }
  if (user.role !== 'super_admin') { window.location.replace('index.html'); return; }
})();

const BASE = 'http://localhost:8000';
const CREDS = {
  sa:    { user_id: 'risk_agent',  password: 'RiskAgent2025!' },
  admin: { user_id: 'admin',       password: 'Admin2025!'     },
  user:  { user_id: 'test_user',   password: 'TestUser2025!'  },
};

// ── state ─────────────────────────────────────────────────────────
let _t = { sa: null, admin: null, user: null };
let _wid = { sa: null, admin: null, user: null };
let _counts = { total:0, pass:0, fail:0, skip:0 };
let _start, _iframe = null;
const _cleanup = [];  // files/workers to delete after run

// ── helpers ───────────────────────────────────────────────────────
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }
function assertStatus(got, expected, msg) {
  if (Array.isArray(expected)) { if (!expected.includes(got)) throw new Error((msg||'') + ` — got ${got}, expected ${expected.join('/')}`); }
  else if (got !== expected) throw new Error((msg||'') + ` — got ${got}, expected ${expected}`);
}
async function api(path, opts = {}, tokenKey = 'sa') {
  const tok = _t[tokenKey];
  const headers = Object.assign({ 'Content-Type':'application/json' }, tok ? { Authorization:'Bearer '+tok } : {});
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    opts.body = JSON.stringify(opts.body);
  } else if (opts.body instanceof FormData) {
    delete headers['Content-Type'];
  }
  const r = await fetch(BASE + path, { ...opts, headers });
  return r;
}
async function login(role) {
  const cred = CREDS[role];
  const r = await fetch(BASE+'/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(cred)
  });
  const d = await r.json();
  if (!d.token) throw new Error('Login failed for '+role+': '+JSON.stringify(d).substring(0,100));
  _t[role] = d.token;
  _wid[role] = d.worker_id;
  return d;
}
function makeFile(name, content = 'Regression test file.') {
  return new File([content], name, { type: 'text/plain' });
}
function makeMd(name) {
  return new File(['# Test Workflow\nCreated by regression suite.'], name, { type: 'text/markdown' });
}
async function uploadFile(tokenKey, file, path='') {
  const fd = new FormData();
  fd.append('file', file);
  if (path) fd.append('path', path);
  const r = await fetch(BASE+'/api/files/upload', {
    method: 'POST',
    headers: { Authorization: 'Bearer '+_t[tokenKey] },
    body: fd,
  });
  return r;
}
async function uploadDomainData(tokenKey, file, subfolder='') {
  const fd = new FormData();
  fd.append('file', file);
  if (subfolder) fd.append('path', subfolder);
  const workerPath = tokenKey === 'sa'
    ? `/api/super/workers/${_wid.admin}/files/domain_data/upload`
    : '/api/admin/worker/files/domain_data/upload';
  const r = await fetch(BASE + workerPath, {
    method: 'POST',
    headers: { Authorization: 'Bearer '+_t[tokenKey] },
    body: fd
  });
  return r;
}
async function uploadVerifiedWf(tokenKey, file) {
  const fd = new FormData();
  fd.append('file', file);
  const workerPath = tokenKey === 'sa'
    ? `/api/super/workers/${_wid.admin}/files/verified_workflows/upload`
    : '/api/admin/worker/files/verified_workflows/upload';
  const r = await fetch(BASE + workerPath, {
    method: 'POST',
    headers: { Authorization: 'Bearer '+_t[tokenKey] },
    body: fd
  });
  return r;
}

// ── iframe helpers for UI DOM tests ──────────────────────────────
function openIframe(url) {
  return new Promise((res) => {
    if (_iframe) { _iframe.remove(); }
    _iframe = document.createElement('iframe');
    _iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1400px;height:900px;border:none;opacity:0';
    _iframe.onload = () => res(_iframe.contentWindow);
    _iframe.src = url;
    document.body.appendChild(_iframe);
  });
}
function iframeDoc() { return _iframe ? _iframe.contentDocument : null; }
function iwin() { return _iframe ? _iframe.contentWindow : null; }
async function injectToken(role) {
  const win = iwin();
  if (!win) throw new Error('No iframe');
  const d = await (await fetch(BASE+'/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(CREDS[role])
  })).json();
  win.sessionStorage.setItem('rg_token', d.token);
  win.sessionStorage.setItem('rg_user', JSON.stringify({
    user_id: d.user_id, role: d.role, display_name: d.display_name,
    worker_id: d.worker_id, is_admin: d.is_admin, token: d.token
  }));
  _t[role] = d.token;
  _wid[role] = d.worker_id;
  return d;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function q(sel) { const d = iframeDoc(); return d ? d.querySelector(sel) : null; }
function qAll(sel) { const d = iframeDoc(); return d ? Array.from(d.querySelectorAll(sel)) : []; }
function qText(sel) { const el = q(sel); return el ? el.textContent.trim() : ''; }
function clickNav(name) {
  const el = qAll('.nav-item').find(e => e.textContent.trim() === name || e.getAttribute('onclick')?.includes("'"+name+"'"));
  if (!el) throw new Error('Nav item not found: '+name);
  el.click();
}

// ── scoring ───────────────────────────────────────────────────────
const _groups = [];
let _curGroup = null;
function group(id, name, role) {
  _curGroup = { id, name, role, tests:[], passCount:0, failCount:0 };
  _groups.push(_curGroup);
  const nav = document.getElementById('group-nav');
  const div = document.createElement('div');
  div.className='nav-group'; div.id='nav-'+id;
  div.textContent = id+': '+name;
  div.innerHTML += ' <span class="g-badge" id="badge-'+id+'">—</span>';
  div.onclick = () => document.getElementById('sec-'+id)?.scrollIntoView({behavior:'smooth'});
  nav.appendChild(div);
  const res = document.getElementById('results');
  const sec = document.createElement('div');
  sec.className='group-block'; sec.id='sec-'+id;
  sec.innerHTML=`<div class="group-title">${id}: ${name} <span class="group-role">${role}</span></div>`;
  res.appendChild(sec);
}
async function test(id, name, fn, opts={}) {
  _counts.total++;
  document.getElementById('s-total').textContent = _counts.total;
  const sec = document.getElementById('sec-'+_curGroup.id);
  const row = document.createElement('div');
  row.className='test-row'; row.id='row-'+id;
  const isIso = name.includes('[ISO]');
  row.innerHTML = `<div class="test-id">${id}</div><div class="test-name${isIso?' isolation':''}">${name}</div><div class="test-status status-run" id="st-${id}">…</div><div class="test-detail" id="det-${id}"></div>`;
  sec.appendChild(row);
  const st = document.getElementById('st-'+id);
  const dt = document.getElementById('det-'+id);
  try {
    if (opts.skip) { st.className='test-status status-skip'; st.textContent='SKIP'; dt.textContent=opts.skip; _counts.skip++; document.getElementById('s-skip').textContent=_counts.skip; _curGroup.tests.push('skip'); return; }
    const detail = await fn();
    st.className='test-status status-pass'; st.textContent='PASS';
    dt.textContent = detail||''; _counts.pass++; document.getElementById('s-pass').textContent=_counts.pass;
    _curGroup.passCount++;
  } catch(e) {
    st.className='test-status status-fail'; st.textContent='FAIL';
    dt.className='test-detail err'; dt.textContent=e.message; _counts.fail++; document.getElementById('s-fail').textContent=_counts.fail;
    _curGroup.failCount++;
  }
  _curGroup.tests.push(st.textContent);
  updateBadge(_curGroup.id, _curGroup.passCount, _curGroup.failCount);
  const pct = Math.round((_counts.pass+_counts.fail+_counts.skip)/_counts.total*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('elapsed').textContent = Math.round((Date.now()-_start)/1000)+'s elapsed';
}
function updateBadge(id, pass, fail) {
  const b = document.getElementById('badge-'+id);
  if (!b) return;
  if (fail>0) { b.textContent=fail+'F'; b.className='g-badge fail'; }
  else { b.textContent=pass+'P'; b.className='g-badge pass'; }
}

// ═══════════════════════════════════════════════════════════════════
//  TEST DEFINITIONS
// ═══════════════════════════════════════════════════════════════════
async function runAll() {
  document.getElementById('runBtn').disabled = true;
  document.getElementById('results').innerHTML='';
  document.getElementById('group-nav').innerHTML='';
  _groups.length=0; _counts={total:0,pass:0,fail:0,skip:0}; _start=Date.now();

  // ── A: Authentication ──────────────────────────────────────────
  group('A','Authentication','all roles');
  await test('A01','super_admin login returns JWT + role + worker_id', async()=>{
    const d=await login('sa'); assert(d.token,'no token'); assert(d.role==='super_admin','wrong role');
    return d.display_name+' · '+d.role+' · '+d.worker_id;
  });
  await test('A02','admin login returns JWT + role', async()=>{
    const d=await login('admin'); assert(d.token&&d.role==='admin','wrong role'); return d.display_name+' · admin';
  });
  await test('A03','user login returns JWT + role', async()=>{
    const d=await login('user'); assert(d.token&&d.role==='user','wrong role'); return d.display_name+' · user';
  });
  await test('A04','wrong password → 401', async()=>{
    const r=await fetch(BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:'admin',password:'WRONG'})});
    assertStatus(r.status,401); return '401 returned';
  });
  await test('A05','unknown user → 401', async()=>{
    const r=await fetch(BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:'nobody',password:'x'})});
    assertStatus(r.status,401); return '401 returned';
  });
  await test('A06','GET /api/auth/me — super_admin profile', async()=>{
    const r=await api('/api/auth/me',{},'sa'); assertStatus(r.status,200);
    const d=await r.json(); assert(d.role==='super_admin'); return d.display_name;
  });
  await test('A07','GET /api/auth/me — admin profile', async()=>{
    const r=await api('/api/auth/me',{},'admin'); assertStatus(r.status,200);
    const d=await r.json(); assert(d.role==='admin'); return d.display_name;
  });
  await test('A08','GET /api/auth/me — user profile', async()=>{
    const r=await api('/api/auth/me',{},'user'); assertStatus(r.status,200);
    const d=await r.json(); assert(d.role==='user'); return d.display_name;
  });
  await test('A09','bad token → 401', async()=>{
    const r=await fetch(BASE+'/api/auth/me',{headers:{Authorization:'Bearer bad.token.here'}});
    assertStatus(r.status,401); return '401 returned';
  });
  await test('A10','no token → 401 on protected endpoint', async()=>{
    const r=await fetch(BASE+'/api/auth/me'); assertStatus(r.status,401); return '401 returned';
  });

  // ── B: Admin Panel — Login and Navigation ─────────────────────
  group('B','Admin Panel — Navigation (admin)','admin');
  let adminWin;
  await test('B01','admin.html loads for admin role', async()=>{
    adminWin = await openIframe(BASE+'/admin.html');
    await injectToken('admin');
    await sleep(800);
    iwin().location.reload();
    await sleep(2000);
    await injectToken('admin');
    await sleep(1000);
    const title = iframeDoc().title;
    assert(title.toLowerCase().includes('admin')||title.toLowerCase().includes('risk'),'wrong page title: '+title);
    return 'page loaded: '+title;
  });
  await test('B02','sidebar nav items visible for admin', async()=>{
    const items = qAll('.nav-item').map(e=>e.textContent.trim()).filter(Boolean);
    const required = ['Dashboard','Worker Config','Tools','Domain Data','Shared Library','Workflows','Users'];
    required.forEach(r=>{ if(!items.some(i=>i.includes(r))) throw new Error('Missing nav item: '+r); });
    return required.join(', ')+' present';
  });
  await test('B03','Manage Workers nav hidden for admin', async()=>{
    // filter to visible items only — #super-nav has display:none so its children exist in DOM but are invisible
    const items = qAll('.nav-item').filter(e=>e.offsetParent!==null).map(e=>e.textContent.trim());
    const hasWorkers = items.some(i=>i.includes('Manage Workers'));
    assert(!hasWorkers,'admin can see Manage Workers nav — should be hidden');
    return 'Manage Workers nav correctly hidden (visible items only)';
  });
  await test('B04','Connectors nav hidden for admin', async()=>{
    const items = qAll('.nav-item').filter(e=>e.offsetParent!==null).map(e=>e.textContent.trim());
    assert(!items.some(i=>i.includes('Connectors')),'admin can see Connectors nav');
    return 'Connectors nav correctly hidden (visible items only)';
  });
  await test('B05','Dashboard section loads', async()=>{
    clickNav('dashboard');
    await sleep(600);
    const sec = iframeDoc()?.getElementById('section-dashboard');
    assert(sec&&sec.offsetParent!==null,'Dashboard section not visible');
    return 'Dashboard section visible';
  });
  await test('B06','Worker Config section loads', async()=>{
    const el = qAll('.nav-item').find(e=>e.getAttribute('onclick')?.includes('worker-config'));
    if (!el) throw new Error('Worker Config nav not found');
    el.click(); await sleep(700);
    const sec = iframeDoc()?.getElementById('section-worker-config');
    assert(sec&&sec.offsetParent!==null,'Worker Config section not visible');
    return 'Worker Config section visible';
  });
  await test('B07','Tools section loads', async()=>{
    qAll('.nav-item').find(e=>e.getAttribute('onclick')?.includes('tools'))?.click();
    await sleep(600);
    const sec = iframeDoc()?.getElementById('section-tools');
    assert(sec&&sec.offsetParent!==null,'Tools section not visible');
    return 'Tools section visible';
  });
  await test('B08','Domain Data section loads with Upload/Folder/Select/Delete buttons', async()=>{
    qAll('.nav-item').find(e=>e.textContent.trim()==='Domain Data')?.click();
    await sleep(600);
    const sec = iframeDoc()?.getElementById('section-domain-data');
    assert(sec&&sec.offsetParent!==null,'Domain Data section not visible');
    const btns = Array.from(sec.querySelectorAll('button')).map(b=>b.textContent.trim()).filter(Boolean);
    ['↑ Upload','+ Folder','Select','Delete'].forEach(b=>{ if(!btns.includes(b)) throw new Error('Missing button: '+b); });
    return 'Upload, Folder, Select, Delete buttons present';
  });
  await test('B09','Shared Library section loads', async()=>{
    qAll('.nav-item').find(e=>e.textContent.trim()==='Shared Library')?.click();
    await sleep(600);
    const sec = iframeDoc()?.getElementById('section-common-data');
    assert(sec&&sec.offsetParent!==null,'Shared Library section not visible');
    return 'Shared Library section visible';
  });
  await test('B10','Workflows section loads with Upload/New/Select/Delete buttons', async()=>{
    qAll('.nav-item').find(e=>e.textContent.trim()==='Workflows')?.click();
    await sleep(600);
    const sec = iframeDoc()?.getElementById('section-workflows');
    assert(sec&&sec.offsetParent!==null,'Workflows section not visible');
    const btns = Array.from(sec.querySelectorAll('button')).map(b=>b.textContent.trim()).filter(Boolean);
    ['↑ Upload .md','+ New','Select','Delete'].forEach(b=>{ if(!btns.includes(b)) throw new Error('Missing button: '+b); });
    return 'Upload, New, Select, Delete buttons present';
  });
  await test('B11','Users section loads with + Create User button', async()=>{
    qAll('.nav-item').find(e=>e.textContent.trim()==='Users')?.click();
    await sleep(800);
    const sec = iframeDoc()?.getElementById('section-users');
    assert(sec&&sec.offsetParent!==null,'Users section not visible');
    const btn = Array.from(sec.querySelectorAll('button')).find(b=>b.textContent.includes('Create User'));
    assert(btn,'Create User button not found');
    return 'Users section visible, Create User button present';
  });
  await test('B12','Audit Log section loads with Refresh + pagination buttons', async()=>{
    qAll('.nav-item').find(e=>e.textContent.trim()==='Audit Log')?.click();
    await sleep(800);
    const sec = iframeDoc()?.getElementById('section-audit');
    assert(sec&&sec.offsetParent!==null,'Audit Log section not visible');
    const refresh = Array.from(sec.querySelectorAll('button')).find(b=>b.textContent.includes('Refresh'));
    assert(refresh,'Refresh button not found in Audit');
    return 'Audit Log loaded with Refresh button';
  });
  await test('B13','Open Chat link present in topbar', async()=>{
    const link = qAll('a').find(a=>a.textContent.includes('Open Chat'));
    assert(link,'Open Chat link not found');
    return 'Open Chat link present: '+link.href;
  });
  await test('B14','Sign Out nav item present', async()=>{
    const el = qAll('.nav-item').find(e=>e.textContent.trim()==='Sign Out');
    assert(el,'Sign Out nav item not found');
    return 'Sign Out nav present';
  });

  // ── C: Admin Panel — Worker Config ────────────────────────────
  group('C','Admin Panel — Worker Config','admin');
  await test('C01','Worker Config form fields present (name, desc, prompt)', async()=>{
    qAll('.nav-item').find(e=>e.getAttribute('onclick')?.includes('worker-config'))?.click();
    await sleep(700);
    const name = iframeDoc()?.getElementById('wc-name');
    const desc = iframeDoc()?.getElementById('wc-desc');
    const prompt = iframeDoc()?.getElementById('wc-prompt');
    assert(name&&desc&&prompt,'Missing worker config fields');
    return 'name='+name.value.substring(0,30)+', desc populated: '+(desc.value.length>0);
  });
  await test('C02','Agent Mode dropdown present with options', async()=>{
    const sel = iframeDoc()?.getElementById('wc-agent-mode');
    assert(sel,'Agent mode select not found');
    const opts = Array.from(sel.options).map(o=>o.text);
    assert(opts.length>0,'No options in agent mode');
    return 'Options: '+opts.join(', ');
  });
  await test('C03','Memory toggle checkbox present', async()=>{
    const cb = iframeDoc()?.getElementById('wc-enable-memory');
    assert(cb,'Memory toggle checkbox not found');
    return 'Memory checkbox present, checked: '+cb.checked;
  });
