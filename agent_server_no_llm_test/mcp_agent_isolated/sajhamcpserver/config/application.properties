# Application Configuration for SAJHA MCP Server v2.9.8

# Application Info
app.name=SAJHA MCP Server
app.version=2.9.8
app.description=Model Context Protocol Server with Web Interface
app.author=Ashutosh Sinha
app.email=ajsinha@gmail.com
app.copyright.years=2025-2030
app.github.repo=https://github.com/ajsinha/sajhamcpserver
app.github.repo.name=ajsinha/sajhamcpserver

# ============================================================
# Configuration Paths (relative to project root)
# ============================================================
# Authentication & Security
config.users.path=config/users.json
config.apikeys.path=config/apikeys.json

# Tool Configuration
config.tools.dir=config/tools

# Prompts Configuration
config.prompts.dir=config/prompts

# IR (Investor Relations) Configuration
config.ir.dir=config/ir

# Literature Configuration
config.literature.dir=config/literature

# ============================================================
# Data Directories (relative to project root)
# ============================================================
# Root for counterparty/financial JSON data files (DataLoader)
# REQ-DD-01: Worker-scoped path for MR worker (primary worker). Tools that lack per-request
# worker-context awareness (duckdb, sqlselect, msdoc) fall back to these properties.
data.root=data/workers/w-market-risk/domain_data

# DuckDB Data Directory
data.duckdb.dir=./data/workers/w-market-risk/domain_data/duckdb

# SQL Select Data Directory
data.sqlselect.dir=./data/workers/w-market-risk/domain_data/sqlselect

# MS Docs Data Directory
data.msdocs.dir=./data/workers/w-market-risk/domain_data/msdocs
tool.msdoc.docs_directory=./data/workers/w-market-risk/domain_data/msdocs

# OLAP Data Directory
data.olap.dir=./data/olap

# ============================================================
# MCP Protocol Settings
# ============================================================
mcp.protocol.version=1.0
mcp.jsonrpc.version=2.0
mcp.supported.methods=initialize,initialized,tools/list,tools/call,ping

# Database Settings (for future use)
db.enabled=false
db.type=sqlite
db.path=data/sajha_mcp.db
db.pool.size=10

# Cache Settings
cache.enabled=true
cache.ttl.seconds=300
cache.max.size=1000

# ============================================================
# External API Keys (for tools)
# ============================================================
# Google Search API
google.api.key=${GOOGLE_API_KEY:}
google.search.engine.id=${GOOGLE_SEARCH_ENGINE_ID:}

# Yahoo Finance (no API key required for basic usage)
yahoo.finance.enabled=true

# Federal Reserve API
fred.api.key=${FRED_API_KEY:}

# Tavily Search API
tavily.api.key=${TAVILY_API_KEY:}

# Wikipedia (no API key required)
wikipedia.enabled=true
wikipedia.language=en

# Email Settings (for notifications)
email.enabled=false
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.user=${EMAIL_USER:}
email.smtp.password=${EMAIL_PASSWORD:}
email.from.address=noreply@sajhamcp.com

# Backup Settings
backup.enabled=false
backup.schedule=0 2 * * *
backup.path=backups/
backup.retention.days=30

# Feature Flags
features.websocket.enabled=true
features.monitoring.enabled=true
features.admin.panel.enabled=true
features.tool.auto.reload=true
features.user.registration=false

# UI Settings
ui.theme=default
ui.items.per.page=25
ui.datetime.format=YYYY-MM-DD HH:mm:ss
ui.chart.refresh.seconds=60

# Development Settings
dev.mode=${DEV_MODE:false}
dev.auto.reload=true
dev.verbose.logging=false

# ============================================================
# IRIS CCR Data
# ============================================================
# REQ-DD-01: Worker-scoped paths for tools without per-request context awareness
data.iris_combined_csv=./data/workers/w-market-risk/domain_data/iris/iris_combined.csv
data.workflows_dir=./data/workers/w-market-risk/workflows

# ============================================================
# File Upload Settings
# REQ-DD-02: Uploads migrated to user-scoped my_data. Fallback points to risk_agent's my_data.
# ============================================================
data.uploads_dir=./data/workers/w-market-risk/my_data/risk_agent
data.uploads_max_size_mb=50

# ============================================================
# OSFI Regulatory Documents Settings
# REQ-DD-01: Migrated to MR worker domain_data
# ============================================================
data.osfi_docs_dir=./data/workers/w-market-risk/domain_data/osfi
data.osfi_chunk_size_chars=8000
data.osfi_max_chunks_per_call=3

# Operational Tools
# REQ-DD-01/REQ-DD-02: Worker-scoped fallback paths
data.templates_dir=./data/workers/w-market-risk/templates
data.canvas_save_subdir=canvas
data.my_data.dir=./data/workers/w-market-risk/my_data/risk_agent
data.domain_data.dir=./data/workers/w-market-risk/domain_data

# Common Data (shared across all workers — REQ-10)
data.common_data.dir=./data/common
