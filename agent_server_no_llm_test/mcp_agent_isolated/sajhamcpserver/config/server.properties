# Server Configuration for SAJHA MCP Server

# Server Settings
server.host=127.0.0.1
server.port=3002
server.debug=false
server.name=SAJHA MCP Server
server.version=2.9.8

# Session Configuration
session.timeout.minutes=60
session.secret.key=sajha-mcp-server-secret-2025

# Authentication Settings
auth.max.login.attempts=5
auth.lockout.duration.minutes=5
auth.password.min.length=6

# Tool Registry Settings
tools.config.dir=config/tools
tools.scan.interval.seconds=5
tools.max.execution.time.seconds=300
tools.concurrent.executions=10

# Hot-Reload Configuration
hot_reload.interval.seconds=300
hot_reload.tools.interval.seconds=5
hot_reload.enabled=true

# WebSocket Configuration
websocket.ping.interval=30
websocket.ping.timeout=60
websocket.max.connections=200

# API Rate Limiting
api.rate.limit.enabled=true
api.rate.limit.requests.per.minute=100
api.rate.limit.burst=20

# Logging Configuration
logging.level=INFO
logging.file=logs/server.log
logging.max.size.mb=100
logging.backup.count=10

# Monitoring Settings
monitoring.enabled=true
monitoring.metrics.interval.seconds=60
monitoring.data.retention.hours=24

# CORS Settings
cors.enabled=true
cors.allowed.origins=*
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=Content-Type,Authorization

# Performance Settings
performance.request.timeout.seconds=30
performance.max.request.size.mb=10
performance.thread.pool.size=20

# Security Settings
security.https.required=false
security.token.expiry.hours=1
security.csrf.protection=true

# =============================================================
# DATA GOVERNANCE
# =============================================================
data.root=data
tool.counterparty_exposure.data_file=counterparties/exposure.json
tool.trade_inventory.data_file=counterparties/trades.json
tool.credit_limits.data_file=counterparties/credit_limits.json
tool.var_contribution.data_file=counterparties/var.json
tool.historical_exposure.data_file=counterparties/historical

# =============================================================
# EXTERNAL API BASE URLs
# =============================================================
tool.fred.api_url=https://api.stlouisfed.org/fred
tool.ecb.api_url=https://data-api.ecb.europa.eu
tool.imf.api_url=https://www.imf.org/external/datamapper/api
tool.world_bank.api_url=https://api.worldbank.org/v2
tool.bank_of_canada.api_url=https://www.bankofcanada.ca/valet
tool.japan_central_bank.api_url=https://www.boj.or.jp/en/statistics
tool.india_central_bank.api_url=https://api.rbi.org.in/api
tool.china_central_bank.api_url=http://www.pbc.gov.cn/en/3688229
tool.france_central_bank.api_url=https://www.banque-france.fr/en/statistics
tool.fbi.api_url=https://api.usa.gov/crime/fbi/cde
tool.united_nations.api_url=https://data.un.org/ws/rest
tool.wikipedia.api_url=https://en.wikipedia.org/api/rest_v1
tool.edgar.api_url=https://efts.sec.gov
tool.edgar.submissions_url=https://data.sec.gov/submissions
tool.edgar.company_facts_url=https://data.sec.gov/api/xbrl/companyfacts
tool.google_search.api_url=https://www.googleapis.com/customsearch/v1
tool.tavily.api_url=https://api.tavily.com/search
tool.yahoo_finance.base_url=https://query1.finance.yahoo.com
