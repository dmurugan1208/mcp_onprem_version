version: '3.8'
# Local dev stack for REQ-08a (S3) and REQ-08b (Iceberg).
# No AWS credentials needed — MinIO is S3-compatible, Nessie is an Iceberg catalog.
#
# Usage:
#   docker-compose -f docker-compose.local.yml up -d
#
# Set these env vars in .env to point the app at local services:
#   STORAGE_BACKEND=s3
#   S3_BUCKET=bpulse-dev
#   S3_ENDPOINT_URL=http://localhost:9000
#   AWS_ACCESS_KEY_ID=minioadmin
#   AWS_SECRET_ACCESS_KEY=minioadmin
#   AWS_REGION=us-east-1
#
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
# Nessie API:    http://localhost:19120/api/v1
# PostgreSQL:    localhost:5432  db=bpulse  (for local dev without brew postgres)

services:

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket setup (runs once, creates bpulse-dev bucket)
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/bpulse-dev &&
        echo 'MinIO bucket bpulse-dev ready'
      "

  # Nessie — Iceberg REST catalog (REQ-08b)
  nessie:
    image: projectnessie/nessie:latest
    ports:
      - "19120:19120"
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
