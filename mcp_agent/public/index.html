<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Intelligence Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       ROOT & RESET
       ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-page: #171717;
      --bg-sidebar: #171717;
      --bg-chat: #212121;
      --bg-user-bubble: #303030;
      --bg-input: #303030;
      --bg-elevated: #1a1a1a;
      --bg-hover: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --border-tool: #404040;
      --text-primary: #e5e5e5;
      --text-secondary: #a1a1a1;
      --text-muted: #737373;
      --green: #4CAF50;
      --red: #ef4444;
      --blue: #3b82f6;
      --amber: #FFB300;
      --amber-dim: #b37e00;
      --amber-glow: rgba(255,179,0,0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --sidebar-width: 260px;
      --transition: 150ms ease;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
      font-size: 14px;
      overflow: hidden;
    }

    /* ================================================================
       SCROLLBAR
       ================================================================ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ================================================================
       APP SHELL
       ================================================================ */
    #app {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* ================================================================
       SIDEBAR
       ================================================================ */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      transform: translateX(0);
      transition: transform 0.3s ease, min-width 0.3s ease, width 0.3s ease;
      z-index: 50;
      overflow: hidden;
    }

    #sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
      transform: translateX(calc(-1 * var(--sidebar-width)));
    }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      flex-shrink: 0;
    }

    .sidebar-toggle {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .sidebar-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-toggle svg {
      width: 20px;
      height: 20px;
    }

    .btn-new-chat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin: 0 12px 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    .btn-new-chat:hover {
      background: var(--bg-hover);
    }

    .btn-new-chat svg {
      width: 16px;
      height: 16px;
    }

    .sidebar-conversations {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .sidebar-group-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 12px 8px 4px 8px;
      text-transform: none;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: background var(--transition), color var(--transition);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }

    .sidebar-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }

    .sidebar-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item-delete {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      transition: color var(--transition);
    }

    .sidebar-item:hover .sidebar-item-delete {
      display: flex;
    }

    .sidebar-item-delete:hover {
      color: var(--red);
    }

    .sidebar-bottom {
      flex-shrink: 0;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .sidebar-bottom-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: background var(--transition), color var(--transition);
    }

    .sidebar-bottom-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-bottom-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ================================================================
       MAIN AREA
       ================================================================ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      min-width: 0;
      position: relative;
    }

    /* ================================================================
       HEADER BAR
       ================================================================ */
    #chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
      z-index: 40;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-toggle {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      display: none;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .header-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .header-toggle svg {
      width: 20px;
      height: 20px;
    }

    #sidebar.collapsed ~ #main .header-toggle {
      display: flex;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cost-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 12px;
      border: 1px solid var(--border);
      cursor: default;
      position: relative;
    }

    .cost-pill .cost-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      white-space: nowrap;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      line-height: 1.8;
    }

    .cost-pill:hover .cost-tooltip {
      display: block;
    }

    /* ================================================================
       CHAT CONTAINER
       ================================================================ */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #chat-inner {
      max-width: 48rem;
      margin: 0 auto;
      padding: 20px 24px 100px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ================================================================
       WELCOME SCREEN
       ================================================================ */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px 20px;
    }

    .welcome-screen.hidden { display: none; }

    .welcome-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #303030, #404040);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 24px;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .welcome-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .sample-chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 560px;
      width: 100%;
    }

    .sample-chip {
      padding: 12px 16px;
      background: var(--bg-user-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      text-align: left;
      line-height: 1.4;
    }

    .sample-chip:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.15);
    }

    /* ================================================================
       RESTORE BANNER
       ================================================================ */
    .restore-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      margin: 0 auto 8px auto;
      max-width: 280px;
    }

    .restore-banner.visible { display: flex; }

    /* ================================================================
       MESSAGES
       ================================================================ */
    .msg {
      display: flex;
      gap: 12px;
      animation: msgFadeIn 0.3s ease;
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* User message: right-aligned bubble */
    .msg-user {
      justify-content: flex-end;
    }

    .msg-user .msg-body {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      max-width: 70%;
    }

    .bubble-user {
      background: var(--bg-user-bubble);
      border-radius: var(--radius-xl);
      padding: 10px 20px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      word-break: break-word;
    }

    /* Agent message: left-aligned, no bubble */
    .msg-agent {
      align-items: flex-start;
    }

    .msg-agent .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #303030;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-agent .msg-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-agent-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: -4px;
    }

    /* ================================================================
       MESSAGE ACTIONS (hover)
       ================================================================ */
    .msg-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 4px;
    }

    .msg-agent:hover .msg-actions,
    .msg-actions.visible {
      opacity: 1;
    }

    .msg-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background var(--transition), color var(--transition);
    }

    .msg-actions button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* ================================================================
       REASONING BUBBLE
       ================================================================ */
    .reasoning-bubble {
      background: var(--bg-elevated);
      border-left: 2px solid #404040;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .reasoning-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      user-select: none;
    }

    .reasoning-chevron {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.25s ease;
      display: inline-flex;
      align-items: center;
    }

    .reasoning-chevron svg {
      width: 12px;
      height: 12px;
      transition: transform 0.25s ease;
    }

    .reasoning-bubble.expanded .reasoning-chevron svg {
      transform: rotate(90deg);
    }

    .reasoning-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .reasoning-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .reasoning-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
      padding: 0 12px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .reasoning-bubble.expanded .reasoning-content {
      max-height: 600px;
      overflow-y: auto;
      padding: 0 12px 10px 12px;
    }

    .reasoning-bubble.streaming .reasoning-content {
      max-height: 400px;
      overflow-y: auto;
      padding: 0 12px 10px 12px;
    }

    /* ================================================================
       TOOL CARDS
       ================================================================ */
    .tool-cards {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tool-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left: 3px solid var(--text-muted);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      overflow: hidden;
      transition: all 0.25s ease;
      animation: toolSlideIn 0.25s ease;
    }

    @keyframes toolSlideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .tool-card.flash-highlight {
      animation: flashTool 1.2s ease;
    }

    @keyframes flashTool {
      0%, 100% { box-shadow: none; }
      30% { box-shadow: 0 0 16px rgba(255,255,255,0.08); }
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }

    .tool-header:hover {
      background: var(--bg-hover);
    }

    .tool-icon { font-size: 14px; }

    .tool-name {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .tool-status { font-size: 13px; }

    .tool-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .tool-chevron {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.25s ease;
      display: inline-flex;
    }

    .tool-chevron svg {
      width: 12px;
      height: 12px;
      transition: transform 0.25s ease;
    }

    .tool-card.expanded .tool-chevron svg {
      transform: rotate(90deg);
    }

    .tool-detail {
      display: none;
      padding: 0 12px 10px 12px;
      border-top: 1px solid var(--border);
    }

    .tool-card.expanded .tool-detail {
      display: block;
    }

    .tool-detail-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .tool-detail-data {
      background: #000;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .spinner-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: dotPulse 1s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    .status-success { color: var(--green); }
    .status-error { color: var(--red); }

    /* ================================================================
       SYNTHESIS (assistant text)
       ================================================================ */
    .synthesis {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      word-break: break-word;
    }

    .synthesis h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .synthesis h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 20px;
      margin-bottom: 8px;
    }

    .synthesis h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .synthesis p {
      margin-bottom: 10px;
      color: var(--text-secondary);
    }

    .synthesis ul, .synthesis ol {
      margin-left: 20px;
      margin-bottom: 10px;
      color: var(--text-secondary);
    }

    .synthesis li { margin-bottom: 4px; }
    .synthesis strong { color: var(--text-primary); }

    .synthesis code {
      background: #000;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
    }

    .synthesis pre {
      position: relative;
      margin: 12px 0;
    }

    .synthesis pre .code-block {
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .synthesis pre .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    .synthesis pre .code-body {
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      color: var(--text-secondary);
    }

    .synthesis pre .code-copy-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      transition: color var(--transition);
    }

    .synthesis pre .code-copy-btn:hover {
      color: var(--text-primary);
    }

    .synthesis table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
    }

    .synthesis th, .synthesis td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .synthesis th {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* Blinking cursor */
    .cursor-blink::after {
      content: '\u2588';
      animation: blink 1s step-end infinite;
      color: var(--text-secondary);
      font-weight: 300;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Attribution badge */
    .attr-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      vertical-align: baseline;
    }

    .attr-badge:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    /* ================================================================
       HITL CARD
       ================================================================ */
    .hitl-card {
      background: var(--bg-elevated);
      border: 1px solid rgba(255,179,0,0.3);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      max-width: 500px;
    }

    .hitl-card .hitl-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .hitl-card .hitl-question {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .hitl-card .hitl-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .hitl-option-btn {
      padding: 6px 14px;
      background: var(--bg-user-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .hitl-option-btn:hover {
      border-color: var(--amber);
      background: var(--amber-glow);
    }

    .hitl-option-btn.selected {
      border-color: var(--amber);
      background: var(--amber-glow);
      color: var(--amber);
      font-weight: 600;
    }

    .hitl-card .hitl-freetext {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-user-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .hitl-card .hitl-freetext:focus {
      outline: none;
      border-color: rgba(255,255,255,0.2);
    }

    .hitl-card .hitl-submit {
      padding: 7px 18px;
      background: var(--text-primary);
      border: none;
      border-radius: var(--radius-sm);
      color: #171717;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .hitl-card .hitl-submit:hover {
      opacity: 0.9;
    }

    /* ================================================================
       INPUT BAR
       ================================================================ */
    #input-bar {
      flex-shrink: 0;
      padding: 0 24px 20px 24px;
      position: relative;
    }

    #input-inner {
      max-width: 48rem;
      margin: 0 auto;
    }

    .input-container {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: var(--bg-input);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 4px 4px 4px 16px;
      transition: border-color var(--transition);
    }

    .input-container:focus-within {
      border-color: rgba(255,255,255,0.15);
    }

    #query-input {
      flex: 1;
      min-height: 40px;
      max-height: 150px;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      overflow-y: auto;
    }

    #query-input:focus {
      outline: none;
    }

    #query-input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--text-primary);
      color: #171717;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }

    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-send svg {
      width: 16px;
      height: 16px;
    }

    .btn-cancel-run {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: var(--text-primary);
      color: #171717;
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: opacity var(--transition);
      flex-shrink: 0;
    }

    .btn-cancel-run:hover { opacity: 0.85; }
    .btn-cancel-run.visible { display: flex; }

    .btn-cancel-run svg {
      width: 14px;
      height: 14px;
    }

    .input-footer {
      text-align: center;
      padding-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ================================================================
       TOAST
       ================================================================ */
    #toast {
      display: none;
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #toast.visible {
      display: block;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ================================================================
       DELETE CONFIRMATION OVERLAY
       ================================================================ */
    .delete-confirm {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .delete-confirm-box {
      background: var(--bg-user-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      max-width: 360px;
      width: 90%;
    }

    .delete-confirm-box h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .delete-confirm-box p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .delete-confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .delete-confirm-actions button {
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background var(--transition);
    }

    .delete-confirm-cancel {
      background: transparent;
      color: var(--text-primary);
    }

    .delete-confirm-cancel:hover {
      background: var(--bg-hover);
    }

    .delete-confirm-ok {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    .delete-confirm-ok:hover {
      opacity: 0.9;
    }

    /* ================================================================
       PRINT
       ================================================================ */
    @media print {
      body { background: #fff !important; color: #000 !important; overflow: visible !important; }
      #sidebar, #chat-header, #input-bar, #toast,
      .msg-user, .msg-actions, .msg-agent .msg-avatar,
      .reasoning-bubble, .tool-cards,
      .welcome-screen, .restore-banner, .hitl-card,
      .input-footer, .delete-confirm { display: none !important; }
      #main { background: #fff !important; }
      #chat-container { overflow: visible !important; height: auto !important; }
      #chat-inner { max-width: 100% !important; padding: 20px !important; }
      .msg-agent { max-width: 100% !important; }
      .synthesis {
        color: #000 !important;
      }
      .synthesis h1 { color: #000 !important; border-bottom-color: #ccc !important; }
      .synthesis h2, .synthesis h3 { color: #222 !important; }
      .synthesis p, .synthesis li { color: #333 !important; }
      .synthesis code { background: #eee !important; color: #333 !important; }
      .synthesis th { color: #333 !important; }
      .attr-badge { border: 1px solid #ccc !important; }
    }

    /* ================================================================
       RESPONSIVE
       ================================================================ */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
      }
      #sidebar.collapsed {
        transform: translateX(-100%);
      }
      .msg-user .msg-body { max-width: 85%; }
      #chat-inner { padding: 16px 14px 80px 14px; }
      #input-bar { padding: 0 14px 14px 14px; }
      .sample-chips { grid-template-columns: 1fr; }
      .bubble-user { font-size: 14px; padding: 8px 16px; }
    }
  </style>
</head>
