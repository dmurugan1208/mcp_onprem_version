server {
    listen       ${PORT};
    server_name  _;

    # Allow file uploads up to 22 MB (FastAPI enforces 20 MB; extra headroom for multipart overhead)
    client_max_body_size 22M;

    # ── Static frontend (chat UI, admin panel, login) ──────────────────────────
    root  /app/public;
    index login.html;

    location = / {
        return 302 /login.html;
    }

    location / {
        try_files $uri $uri.html =404;
    }

    # ── Agent server (FastAPI / SSE streaming) ─────────────────────────────────
    # SSE requires: no buffering, no cache, long timeout, HTTP/1.1 keepalive off.
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';    # disable keepalive so SSE chunks flush
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /docs {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── SAJHA MCP Studio (super_admin only) ────────────────────────────────────
    # nginx strips /mcp-studio/ via proxy_pass trailing slash.
    # X-Script-Name header tells Flask (via ScriptNameMiddleware) to prefix URLs.
    # sub_filter rewrites hardcoded JS fetch/ajax /api/ calls to /mcp-studio/api/
    # so they reach SAJHA and not the agent server.
    location /mcp-studio/ {
        proxy_pass          http://127.0.0.1:3002/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Script-Name     /mcp-studio;
        proxy_set_header    Accept-Encoding   "";   # disable upstream gzip so sub_filter works

        # Rewrite hardcoded JS API paths in HTML and JS responses
        sub_filter_once  off;
        sub_filter_types text/html text/javascript application/javascript;
        sub_filter "fetch('/api/"       "fetch('/mcp-studio/api/";
        sub_filter 'fetch("/api/'       'fetch("/mcp-studio/api/';
        sub_filter "url: '/api/"        "url: '/mcp-studio/api/";
        sub_filter 'url: "/api/'        'url: "/mcp-studio/api/';
        sub_filter "url:'/api/"         "url:'/mcp-studio/api/";
        sub_filter 'url:"/api/'         'url:"/mcp-studio/api/';
    }

    # Separate location for SAJHA static assets — no sub_filter overhead
    location /mcp-studio/static/ {
        proxy_pass         http://127.0.0.1:3002/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1h;
        add_header         Cache-Control "public";
    }

    # ── Socket.io for MCP protocol clients (Claude Desktop etc.) ──────────────
    location /socket.io/ {
        proxy_pass          http://127.0.0.1:3002;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }
}
